<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<title>AutoShares API Documentation</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ── Light theme (default) ── */
:root, [data-theme="light"] {
  --bg:#ffffff; --bg1:#f6f8fa; --bg2:#f0f2f5; --bg3:#e8ebef;
  --b1:rgba(208,215,222,.7); --t1:#1f2328; --t2:#424a53; --t3:#656d76; --t4:#8b949e;
  --ac:#00967d; --ac-dim:rgba(0,150,125,.08); --ac-text:#00967d;
  --code-bg:#f0f2f5; --shadow:rgba(0,0,0,.08);
}
/* ── Dark theme ── */
[data-theme="dark"] {
  --bg:#0d1117; --bg1:#161b22; --bg2:#1c2128; --bg3:#21262d;
  --b1:rgba(48,54,61,.7); --t1:#e6edf3; --t2:#b1bac4; --t3:#8b949e; --t4:#6e7681;
  --ac:#00c9a7; --ac-dim:rgba(0,201,167,.12); --ac-text:#00c9a7;
  --code-bg:#1c2128; --shadow:rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:Inter,-apple-system,system-ui,sans-serif;line-height:1.6;display:flex;min-height:100vh;transition:background .2s,color .2s}

/* Sidebar */
.sidebar{width:280px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--b1);overflow-y:auto;padding:16px 0;position:fixed;top:0;left:0;bottom:0;z-index:10;transition:background .2s}
.sb-header{padding:12px 20px 12px;border-bottom:1px solid var(--b1);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.sb-brand{display:flex;flex-direction:column}
.sb-brand h1{font-size:16px;font-weight:800;color:var(--ac-text)}
.sb-brand span{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.theme-btn{width:32px;height:32px;border:1px solid var(--b1);border-radius:6px;background:var(--bg2);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:16px;flex-shrink:0}
.theme-btn:hover{color:var(--ac-text);border-color:var(--ac-text)}
.sb-section{padding:4px 0}
.sb-section-title{padding:12px 20px 4px;font-size:9px;font-weight:800;color:var(--t4);text-transform:uppercase;letter-spacing:.08em}
.sb-link{display:block;padding:5px 20px;font-size:13px;color:var(--t3);text-decoration:none;cursor:pointer;transition:all .1s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-link:hover{color:var(--t1);background:var(--bg2)}
.sb-link.active{color:var(--ac-text);border-left-color:var(--ac-text);background:var(--ac-dim);font-weight:700}
.sb-link.depth-1{padding-left:32px;font-size:12px}
.sb-link.depth-2{padding-left:44px;font-size:12px}
.sb-link.depth-3{padding-left:56px;font-size:11px}
.sb-toggle{display:none;padding:10px 16px;background:var(--bg1);border:0;border-bottom:1px solid var(--b1);color:var(--t2);font-size:14px;font-weight:700;cursor:pointer;width:100%;text-align:left;position:fixed;top:0;left:0;right:0;z-index:20;font-family:inherit}

/* Content */
.content{flex:1;margin-left:280px;padding:32px 40px;max-width:900px;transition:background .2s}
.content.loading{opacity:.5}

/* Markdown */
.md h1{font-size:28px;font-weight:800;color:var(--t1);margin:0 0 16px;padding-bottom:8px;border-bottom:1px solid var(--b1)}
.md h2{font-size:20px;font-weight:800;color:var(--t1);margin:28px 0 12px}
.md h3{font-size:16px;font-weight:700;color:var(--t2);margin:20px 0 8px}
.md h4{font-size:14px;font-weight:700;color:var(--t3);margin:16px 0 6px}
.md p{color:var(--t2);margin:0 0 12px;font-size:14px;line-height:1.7}
.md a{color:var(--ac-text);text-decoration:none;font-weight:600}
.md a:hover{text-decoration:underline}
.md ul,.md ol{margin:0 0 12px 20px;color:var(--t2);font-size:14px}
.md li{margin-bottom:4px}
.md code{font-family:ui-monospace,'SF Mono',monospace;font-size:12px;padding:2px 6px;background:var(--code-bg);border-radius:4px;color:var(--ac-text)}
.md pre{background:var(--code-bg);border:1px solid var(--b1);border-radius:7px;padding:14px 16px;overflow-x:auto;margin:0 0 16px;font-size:12px;line-height:1.5;position:relative}
.md pre code{padding:0;background:none;color:var(--t1)}
/* Copy button on code blocks */
.copy-btn{position:absolute;top:6px;right:6px;padding:4px 8px;border:1px solid var(--b1);border-radius:4px;background:var(--bg1);color:var(--t4);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;opacity:0;transition:opacity .15s}
.md pre:hover .copy-btn{opacity:1}
.copy-btn:hover{color:var(--ac-text);border-color:var(--ac-text)}
.copy-btn.copied{color:var(--ac-text);border-color:var(--ac-text)}
/* Try It panel */
.tryit{margin:0 0 16px;border:1px solid var(--b1);border-radius:7px;overflow:hidden}
.tryit-header{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--b1);cursor:pointer}
.tryit-header:hover{background:var(--bg3)}
.tryit-method{font-size:10px;font-weight:800;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.tryit-method-get{background:rgba(34,197,94,.12);color:#16a34a}
.tryit-method-post{background:rgba(0,153,255,.12);color:#0077cc}
.tryit-method-put{background:rgba(245,158,11,.12);color:#d97706}
.tryit-method-delete{background:rgba(239,68,68,.12);color:#dc2626}
[data-theme="dark"] .tryit-method-get{color:#22c55e}
[data-theme="dark"] .tryit-method-post{color:#0099ff}
[data-theme="dark"] .tryit-method-put{color:#f59e0b}
[data-theme="dark"] .tryit-method-delete{color:#ef4444}
.tryit-url{font-family:ui-monospace,monospace;font-size:12px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tryit-toggle{font-size:10px;font-weight:700;color:var(--ac-text);text-transform:uppercase;letter-spacing:.06em}
.tryit-body{display:none;padding:14px;background:var(--bg1)}
.tryit-body.open{display:block}
.tryit-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-end;flex-wrap:wrap}
.tryit-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:140px}
.tryit-label{font-size:9px;font-weight:800;color:var(--t4);text-transform:uppercase;letter-spacing:.06em}
.tryit-inp{padding:6px 8px;border:1.5px solid var(--b1);background:var(--bg);border-radius:4px;color:var(--t1);font-size:12px;font-family:ui-monospace,monospace}
.tryit-inp:focus{border-color:var(--ac-text);outline:none}
.tryit-send{padding:7px 16px;background:var(--ac-text);color:#fff;border:0;border-radius:5px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap}
[data-theme="light"] .tryit-send{color:#000}
.tryit-send:hover{filter:brightness(1.1)}
.tryit-send:disabled{opacity:.5;cursor:not-allowed}
.tryit-response{margin-top:10px}
.tryit-response-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tryit-status{font-size:11px;font-weight:800;font-variant-numeric:tabular-nums}
.tryit-status-ok{color:#16a34a}
.tryit-status-err{color:#dc2626}
[data-theme="dark"] .tryit-status-ok{color:#22c55e}
[data-theme="dark"] .tryit-status-err{color:#ef4444}
.tryit-time{font-size:10px;color:var(--t4);font-variant-numeric:tabular-nums}
.tryit-output{background:var(--code-bg);border:1px solid var(--b1);border-radius:5px;padding:10px 12px;font-family:ui-monospace,monospace;font-size:11px;color:var(--t1);max-height:300px;overflow:auto;white-space:pre-wrap;word-break:break-all}
.md table{width:100%;border-collapse:collapse;margin:0 0 16px;font-size:13px}
.md th{text-align:left;padding:8px 10px;font-size:10px;font-weight:800;color:var(--t4);text-transform:uppercase;letter-spacing:.06em;background:var(--bg2);border-bottom:1px solid var(--b1)}
.md td{padding:8px 10px;border-bottom:1px solid var(--b1);color:var(--t2);vertical-align:top}
.md tr:hover td{background:var(--bg2)}
.md blockquote{border-left:3px solid var(--ac);margin:0 0 16px;padding:8px 16px;background:var(--ac-dim);border-radius:0 5px 5px 0}
.md blockquote p{color:var(--t2);margin:0}
.md img{max-width:100%;border-radius:6px;border:1px solid var(--b1);margin:8px 0}
.md hr{border:0;border-top:1px solid var(--b1);margin:24px 0}

/* HTTP badges */
.badge{display:inline-block;font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;margin-right:4px;text-transform:uppercase;letter-spacing:.04em;vertical-align:middle}
.badge-get{background:rgba(34,197,94,.12);color:#16a34a}
.badge-post{background:rgba(0,153,255,.12);color:#0077cc}
.badge-put{background:rgba(245,158,11,.12);color:#d97706}
.badge-delete{background:rgba(239,68,68,.12);color:#dc2626}
[data-theme="dark"] .badge-get{color:#22c55e}
[data-theme="dark"] .badge-post{color:#0099ff}
[data-theme="dark"] .badge-put{color:#f59e0b}
[data-theme="dark"] .badge-delete{color:#ef4444}

/* Search */
.sb-search{padding:8px 16px}
.sb-search input{width:100%;padding:6px 10px;border:1.5px solid var(--b1);background:var(--bg);border-radius:5px;color:var(--t1);font-size:12px;font-family:inherit;transition:border-color .15s}
.sb-search input:focus{border-color:var(--ac-text);outline:none}
.sb-search input::placeholder{color:var(--t4)}

/* Breadcrumb */
.breadcrumb{font-size:11px;color:var(--t4);margin-bottom:16px}
.breadcrumb span{color:var(--t3)}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .2s;width:280px}
  .sidebar.open{transform:translateX(0)}
  .sb-toggle{display:block}
  .content{margin-left:0;padding:56px 16px 32px}
}
</style>
</head>

function toggleTheme(){applyTheme(getTheme()==='dark'?'light':'dark')}

/* ── Helper functions ── */
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function parseCurl(txt){
  try{
    txt=txt.replace(/\\\s*\n/g,' ').replace(/\s+/g,' ').trim();
    var method='GET';
    var mm=txt.match(/-X\s+(\w+)/);if(mm)method=mm[1].toUpperCase();
    else if(/-d\s/.test(txt)||/--data/.test(txt))method='POST';
    var url='';var um=txt.match(/'(https?:\/\/[^']+)'/);if(um)url=um[1];
    if(!um){um=txt.match(/"(https?:\/\/[^"]+)"/);if(um)url=um[1]}
    if(!url){um=txt.match(/'([^']*etnasoft[^']*)/);if(um)url=um[1]}
    if(!url)return null;
    var headers={};var re=/--header\s+'([^:]+):\s*([^']+)'/g;var h;
    while((h=re.exec(txt))!==null){
      var hname=h[1].trim();
      if(hname.toLowerCase()!=='content-type'&&hname.toLowerCase()!=='accept')headers[hname]=h[2].trim();
    }
    var body='';var bm=txt.match(/-d\s+'([\s\S]*?)'\s*(?:'|$)/);
    if(bm)body=bm[1].replace(/\\\s*/g,'').trim();
    return{method:method,url:url,headers:headers,body:body};
  }catch(e){return null}
}
function buildHeaderFields(headers){
  var html='';var keys=Object.keys(headers);
  if(!keys.length)return'';
  html+='<div class="tryit-label" style="margin-bottom:4px">Headers</div>';
  for(var i=0;i<keys.length;i++){
    html+='<div class="tryit-row"><div class="tryit-field"><label class="tryit-label">'+escHtml(keys[i])+'</label><input class="tryit-inp tryit-hdr-inp" data-hdr="'+escHtml(keys[i])+'" value="'+escHtml(headers[keys[i]])+'"></div></div>';
  }
  return html;
}
function executeTryIt(btn){
  var panel=btn.closest('.tryit-body');
  var url=panel.querySelector('.tryit-url-inp').value;
  var method=panel.querySelector('input[readonly]').value;
  var hdrs={};
  var hdrInps=panel.querySelectorAll('.tryit-hdr-inp');
  for(var i=0;i<hdrInps.length;i++)hdrs[hdrInps[i].getAttribute('data-hdr')]=hdrInps[i].value;
  hdrs['Accept']='application/json';
  var bodyEl=panel.querySelector('.tryit-body-inp');
  var body=bodyEl?bodyEl.value:null;
  var respDiv=panel.querySelector('.tryit-response');
  btn.disabled=true;btn.textContent='Sending...';
  var t0=Date.now();
  fetch(url,{method:method,headers:hdrs,body:body&&method!=='GET'?body:undefined})
  .then(function(r){
    var elapsed=Date.now()-t0;
    return r.text().then(function(txt){
      var ok=r.ok;
      var pretty=txt;
      try{pretty=JSON.stringify(JSON.parse(txt),null,2)}catch(e){}
      respDiv.innerHTML='<div class="tryit-response-header"><span class="tryit-status '+(ok?'tryit-status-ok':'tryit-status-err')+'">'+r.status+' '+r.statusText+'</span><span class="tryit-time">'+elapsed+'ms</span></div><pre class="tryit-output">'+escHtml(pretty)+'</pre>';
    });
  }).catch(function(err){
    respDiv.innerHTML='<div class="tryit-response-header"><span class="tryit-status tryit-status-err">Error</span></div><pre class="tryit-output">'+escHtml(err.message||String(err))+'\n\nNote: CORS may block browser requests to the API.\nUse the CURL command in your terminal instead.</pre>';
  }).finally(function(){btn.disabled=false;btn.textContent='Send Request'});
}

/* ── Navigation rendering ── */
var currentPath='';
function renderNav(filter){
  var tree=document.getElementById('nav-tree'),q=(filter||'').toLowerCase(),html='';
  for(var i=0;i<NAV_DATA.length;i++){
    var sec=NAV_DATA[i],items=q?sec.items.filter(function(x){return x.t.toLowerCase().indexOf(q)>=0||sec.s.toLowerCase().indexOf(q)>=0}):sec.items;
    if(!items.length)continue;
    html+='<div class="sb-section"><div class="sb-section-title">'+sec.s+'</div>';
    for(var j=0;j<items.length;j++){
      var it=items[j];
      html+='<a class="sb-link depth-'+it.d+'" data-path="'+it.p+'" onclick="loadDoc(\''+it.p.replace(/'/g,"\\'")+'\')">' +it.t+'</a>';
    }
    html+='</div>';
  }
  tree.innerHTML=html;
  highlightActive();
}
function filterNav(q){renderNav(q)}
function highlightActive(){
  var els=document.querySelectorAll('.sb-link');
  for(var i=0;i<els.length;i++) els[i].classList.toggle('active',els[i].getAttribute('data-path')===currentPath);
}

/* ── Load and render markdown ── */
function loadDoc(path){
  if(!path)return;
  currentPath=path;
  highlightActive();
  var content=document.getElementById('content'),doc=document.getElementById('doc'),bc=document.getElementById('breadcrumb');
  content.classList.add('loading');
  var parts=path.replace(/README\.md$/,'').replace(/\.md$/,'').split('/').filter(Boolean);
  bc.innerHTML=parts.map(function(p){return'<span>'+p.replace(/-/g,' ').replace(/_/g,' ')+'</span>'}).join(' / ');
  document.querySelector('.sidebar').classList.remove('open');
  fetch(path+'?v='+Date.now()).then(function(r){
    if(!r.ok)throw new Error('Not found');
    return r.text();
  }).then(function(md){
    md=md.replace(/\[([^\]]+)\]\(([^)]*\.md)\)/g,function(match,text,href){
      if(href.indexOf('http')===0)return match;
      var base=path.substring(0,path.lastIndexOf('/')+1);
      var resolved=base+href;
      var segs=resolved.split('/'),out=[];
      for(var i=0;i<segs.length;i++){if(segs[i]==='..')out.pop();else if(segs[i]!=='.')out.push(segs[i])}
      resolved=out.join('/').replace(/\\/g,'');
      return'<a href="javascript:void(0)" onclick="loadDoc(\''+resolved.replace(/'/g,"\\'")+'\')">' +text+'</a>';
    });
    md=md.replace(/{% hint style="(\w+)" %}/g,'<blockquote>').replace(/{% endhint %}/g,'</blockquote>');
    md=md.replace(/{%.*?%}/g,'');
    doc.innerHTML=marked.parse(md);
    var codes=doc.querySelectorAll('code');
    for(var i=0;i<codes.length;i++){
      var t=codes[i].textContent.trim();
      if(/^(GET|POST|PUT|DELETE|PATCH)$/.test(t)) codes[i].outerHTML='<span class="badge badge-'+t.toLowerCase()+'">'+t+'</span>';
    }
    /* Add copy buttons to all code blocks */
    var pres=doc.querySelectorAll('pre');
    for(var i=0;i<pres.length;i++){
      var btn=document.createElement('button');
      btn.className='copy-btn';
      btn.textContent='Copy';
      btn.setAttribute('data-idx',String(i));
      btn.onclick=function(e){
        e.stopPropagation();
        var pre=this.parentElement;
        var code=pre.querySelector('code');
        var text=code?code.textContent:pre.textContent;
        navigator.clipboard.writeText(text).then(function(){
          e.target.textContent='Copied!';
          e.target.classList.add('copied');
          setTimeout(function(){e.target.textContent='Copy';e.target.classList.remove('copied')},1500);
        });
      };
      pres[i].style.position='relative';
      pres[i].appendChild(btn);
    }
    /* Add Try It panels for CURL commands */
    var curlBlocks=doc.querySelectorAll('pre');
    for(var i=0;i<curlBlocks.length;i++){
      var codeEl=curlBlocks[i].querySelector('code');
      var txt=(codeEl?codeEl.textContent:curlBlocks[i].textContent)||'';
      txt=txt.trim();
      if(!/^curl[\s\-]/i.test(txt))continue;
      var parsed=parseCurl(txt);
      if(!parsed)continue;
      var panel=document.createElement('div');
      panel.className='tryit';
      var mc=parsed.method.toLowerCase();
      panel.innerHTML='<div class="tryit-header" onclick="this.nextElementSibling.classList.toggle(\'open\')">'+
        '<span class="tryit-method tryit-method-'+mc+'">'+parsed.method+'</span>'+
        '<span class="tryit-url">'+escHtml(parsed.url)+'</span>'+
        '<span class="tryit-toggle">Try It</span></div>'+
        '<div class="tryit-body">'+
        '<div class="tryit-row">'+
        '<div class="tryit-field" style="flex:2"><label class="tryit-label">URL</label><input class="tryit-inp tryit-url-inp" value="'+escHtml(parsed.url)+'"></div>'+
        '<div class="tryit-field"><label class="tryit-label">Method</label><input class="tryit-inp" value="'+parsed.method+'" readonly></div>'+
        '</div>'+
        buildHeaderFields(parsed.headers)+
        (parsed.body?'<div class="tryit-field" style="margin-bottom:8px"><label class="tryit-label">Body</label><textarea class="tryit-inp tryit-body-inp" rows="4" style="resize:vertical;width:100%">'+escHtml(parsed.body)+'</textarea></div>':'')+
        '<button class="tryit-send" onclick="executeTryIt(this)">Send Request</button>'+
        '<div class="tryit-response"></div>'+
        '</div>';
      curlBlocks[i].parentNode.insertBefore(panel,curlBlocks[i].nextSibling);
    }
    window.scrollTo(0,0);
  }).catch(function(){
    doc.innerHTML='<p style="color:var(--t3)">Could not load <code>'+path+'</code>.</p>';
  });
  content.classList.remove('loading');
  history.replaceState(null,'','#'+path);
}

/* ── Init ── */
renderNav();
loadDoc(location.hash?location.hash.slice(1):'README.md');
window.addEventListener('hashchange',function(){var p=location.hash.slice(1);if(p&&p!==currentPath)loadDoc(p)});
</script>
