<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>AutoShares API Documentation</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--bg:#0d1117;--bg1:#161b22;--bg2:#1c2128;--bg3:#21262d;--b1:rgba(48,54,61,.7);--t1:#e6edf3;--t2:#b1bac4;--t3:#8b949e;--t4:#6e7681;--ac:#00c9a7;--ac-dim:rgba(0,201,167,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:Inter,-apple-system,system-ui,sans-serif;line-height:1.6;display:flex;min-height:100vh}
.sidebar{width:280px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--b1);overflow-y:auto;padding:16px 0;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sb-logo{padding:12px 20px 16px;border-bottom:1px solid var(--b1);margin-bottom:8px}
.sb-logo h1{font-size:16px;font-weight:800;color:var(--ac)}
.sb-logo span{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.sb-section{padding:4px 0}
.sb-section-title{padding:12px 20px 4px;font-size:9px;font-weight:800;color:var(--t4);text-transform:uppercase;letter-spacing:.08em}
.sb-link{display:block;padding:5px 20px;font-size:13px;color:var(--t3);text-decoration:none;cursor:pointer;transition:all .1s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-link:hover{color:var(--t1);background:var(--bg2)}
.sb-link.active{color:var(--ac);border-left-color:var(--ac);background:var(--ac-dim);font-weight:700}
.sb-link.depth-1{padding-left:32px;font-size:12px}
.sb-link.depth-2{padding-left:44px;font-size:12px}
.sb-link.depth-3{padding-left:56px;font-size:11px}
.sb-toggle{display:none;padding:10px 16px;background:var(--bg1);border:0;border-bottom:1px solid var(--b1);color:var(--t2);font-size:14px;font-weight:700;cursor:pointer;width:100%;text-align:left;position:fixed;top:0;left:0;right:0;z-index:20;font-family:inherit}
.content{flex:1;margin-left:280px;padding:32px 40px;max-width:900px}
.content.loading{opacity:.5}
.md h1{font-size:28px;font-weight:800;color:var(--t1);margin:0 0 16px;padding-bottom:8px;border-bottom:1px solid var(--b1)}
.md h2{font-size:20px;font-weight:800;color:var(--t1);margin:28px 0 12px}
.md h3{font-size:16px;font-weight:700;color:var(--t2);margin:20px 0 8px}
.md h4{font-size:14px;font-weight:700;color:var(--t3);margin:16px 0 6px}
.md p{color:var(--t2);margin:0 0 12px;font-size:14px;line-height:1.7}
.md a{color:var(--ac);text-decoration:none;font-weight:600}
.md a:hover{text-decoration:underline}
.md ul,.md ol{margin:0 0 12px 20px;color:var(--t2);font-size:14px}
.md li{margin-bottom:4px}
.md code{font-family:ui-monospace,'SF Mono',monospace;font-size:12px;padding:2px 6px;background:var(--bg3);border-radius:4px;color:var(--ac)}
.md pre{background:var(--bg2);border:1px solid var(--b1);border-radius:7px;padding:14px 16px;overflow-x:auto;margin:0 0 16px;font-size:12px;line-height:1.5}
.md pre code{padding:0;background:none;color:var(--t1)}
.md table{width:100%;border-collapse:collapse;margin:0 0 16px;font-size:13px}
.md th{text-align:left;padding:8px 10px;font-size:10px;font-weight:800;color:var(--t4);text-transform:uppercase;letter-spacing:.06em;background:var(--bg2);border-bottom:1px solid var(--b1)}
.md td{padding:8px 10px;border-bottom:1px solid var(--b1);color:var(--t2);vertical-align:top}
.md tr:hover td{background:var(--bg2)}
.md blockquote{border-left:3px solid var(--ac);margin:0 0 16px;padding:8px 16px;background:var(--ac-dim);border-radius:0 5px 5px 0}
.md blockquote p{color:var(--t2);margin:0}
.md img{max-width:100%;border-radius:6px;border:1px solid var(--b1);margin:8px 0}
.md hr{border:0;border-top:1px solid var(--b1);margin:24px 0}
.badge{display:inline-block;font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;margin-right:4px;text-transform:uppercase;letter-spacing:.04em;vertical-align:middle}
.badge-get{background:rgba(34,197,94,.12);color:#22c55e}
.badge-post{background:rgba(0,153,255,.12);color:#0099ff}
.badge-put{background:rgba(245,158,11,.12);color:#f59e0b}
.badge-delete{background:rgba(239,68,68,.12);color:#ef4444}
.sb-search{padding:8px 16px}
.sb-search input{width:100%;padding:6px 10px;border:1.5px solid var(--b1);background:var(--bg3);border-radius:5px;color:var(--t1);font-size:12px;font-family:inherit}
.sb-search input:focus{border-color:var(--ac);outline:none}
.sb-search input::placeholder{color:var(--t4)}
.breadcrumb{font-size:11px;color:var(--t4);margin-bottom:16px}
.breadcrumb span{color:var(--t3)}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .2s;width:280px}
  .sidebar.open{transform:translateX(0)}
  .sb-toggle{display:block}
  .content{margin-left:0;padding:56px 16px 32px}
}
</style>

var currentPath='';
function renderNav(filter){
  var tree=document.getElementById('nav-tree'),q=(filter||'').toLowerCase(),html='';
  for(var i=0;i<NAV_DATA.length;i++){
    var sec=NAV_DATA[i],items=q?sec.items.filter(function(x){return x.t.toLowerCase().indexOf(q)>=0||sec.s.toLowerCase().indexOf(q)>=0}):sec.items;
    if(!items.length)continue;
    html+='<div class="sb-section"><div class="sb-section-title">'+sec.s+'</div>';
    for(var j=0;j<items.length;j++){
      var it=items[j];
      html+='<a class="sb-link depth-'+it.d+'" data-path="'+it.p+'" onclick="loadDoc(\''+it.p.replace(/'/g,"\\'")+'\')">' +it.t+'</a>';
    }
    html+='</div>';
  }
  tree.innerHTML=html;
  highlightActive();
}
function filterNav(q){renderNav(q)}
function highlightActive(){
  var els=document.querySelectorAll('.sb-link');
  for(var i=0;i<els.length;i++) els[i].classList.toggle('active',els[i].getAttribute('data-path')===currentPath);
}
function loadDoc(path){
  if(!path)return;
  currentPath=path;
  highlightActive();
  var content=document.getElementById('content'),doc=document.getElementById('doc'),bc=document.getElementById('breadcrumb');
  content.classList.add('loading');
  var parts=path.replace(/README\.md$/,'').replace(/\.md$/,'').split('/').filter(Boolean);
  bc.innerHTML=parts.map(function(p){return'<span>'+p.replace(/-/g,' ').replace(/_/g,' ')+'</span>'}).join(' / ');
  document.querySelector('.sidebar').classList.remove('open');
  fetch(path+'?v='+Date.now()).then(function(r){
    if(!r.ok)throw new Error('Not found');
    return r.text();
  }).then(function(md){
    md=md.replace(/\[([^\]]+)\]\(([^)]*\.md)\)/g,function(match,text,href){
      if(href.indexOf('http')===0)return match;
      var base=path.substring(0,path.lastIndexOf('/')+1);
      var resolved=base+href;
      var segs=resolved.split('/'),out=[];
      for(var i=0;i<segs.length;i++){if(segs[i]==='..')out.pop();else if(segs[i]!=='.')out.push(segs[i])}
      resolved=out.join('/').replace(/\\/g,'');
      return'<a href="javascript:void(0)" onclick="loadDoc(\''+resolved.replace(/'/g,"\\'")+'\')">' +text+'</a>';
    });
    md=md.replace(/{% hint style="(\w+)" %}/g,'<blockquote>').replace(/{% endhint %}/g,'</blockquote>');
    md=md.replace(/{%.*?%}/g,'');
    doc.innerHTML=marked.parse(md);
    var codes=doc.querySelectorAll('code');
    for(var i=0;i<codes.length;i++){
      var t=codes[i].textContent.trim();
      if(/^(GET|POST|PUT|DELETE|PATCH)$/.test(t)) codes[i].outerHTML='<span class="badge badge-'+t.toLowerCase()+'">'+t+'</span>';
    }
    window.scrollTo(0,0);
  }).catch(function(){
    doc.innerHTML='<p style="color:var(--t3)">Could not load <code>'+path+'</code>.</p>';
  });
  content.classList.remove('loading');
  history.replaceState(null,'','#'+path);
}
renderNav();
loadDoc(location.hash?location.hash.slice(1):'README.md');
window.addEventListener('hashchange',function(){var p=location.hash.slice(1);if(p&&p!==currentPath)loadDoc(p)});
</script>
